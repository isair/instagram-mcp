# Ruff configuration for instagram-mcp

target-version = "py313"
line-length = 100

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (commented-out code)
    "PL",     # Pylint
    "RUF",    # Ruff-specific rules
    "ASYNC",  # flake8-async
    "S",      # flake8-bandit (security)
    "D",      # pydocstyle
]
ignore = [
    "PLR0913",  # Too many arguments
    "PLR0915",  # Too many statements (tool registration functions are large)
    "PLR2004",  # Magic value comparison
    "S101",     # Use of assert (needed for tests)
    "D107",     # Missing docstring in __init__
    "PLC0415",  # Import not at top-level (needed to avoid circular imports)
]

[lint.pydocstyle]
convention = "google"

[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",     # Allow assert in tests
    "S106",     # Hardcoded password (expected in tests)
    "S108",     # Insecure temp file (expected in tests)
    "ARG001",   # Unused function argument (fixtures)
    "ARG002",   # Unused method argument (fixtures)
    "PLR2004",  # Magic value comparison in tests
    "D100",     # Missing docstring in public module
    "D101",     # Missing docstring in public class
    "D102",     # Missing docstring in public method
    "D103",     # Missing docstring in public function
    "D104",     # Missing docstring in public package
]

[lint.isort]
known-first-party = ["instagram_mcp"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
